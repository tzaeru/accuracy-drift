<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>N-Body Simulation</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="controls-panel">
            <div>
                <label for="gravitySlider">Gravity (G): </label>
                <input
                    type="range"
                    id="gravitySlider"
                    min="0.01"
                    max="2.0"
                    step="0.01"
                    value="1"
                />
                <span id="gravityValue">1.0</span>
            </div>
            <div>
                <label for="particlesSlider">Particles: </label>
                <input
                    type="range"
                    id="particlesSlider"
                    min="2"
                    max="128"
                    step="1"
                    value="60"
                />
                <span id="particlesValue">64</span>
            </div>
            <div>
                <label for="substepsSlider">Substeps: </label>
                <input
                    type="range"
                    id="substepsSlider"
                    min="1"
                    max="100"
                    step="1"
                    value="4"
                />
                <span id="substepsValue">10</span>
            </div>
            <div>
                <label for="timestepSlider">Timestep (ms): </label>
                <input
                    type="range"
                    id="timestepSlider"
                    min="10"
                    max="100"
                    step="1"
                    value="50"
                />
                <span id="timestepValue">2.5</span>
            </div>
            <div>
                <button id="resetButton" style="padding: 8px 16px">
                    Reset Simulation
                </button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="explicitEuler_f32" width="300" height="300"></canvas>
            <canvas id="semiImplicitEuler_f32" width="300" height="300"></canvas>
            <canvas id="leapfrog_f32" width="300" height="300"></canvas>
            <canvas id="stormerVerlet_f32" width="300" height="300"></canvas>
            <canvas id="velocityVerlet_f32" width="300" height="300"></canvas>
        </div>

        <div class="canvas-container">
            <canvas id="explicitEuler_f64" width="300" height="300"></canvas>
            <canvas id="semiImplicitEuler_f64" width="300" height="300"></canvas>
            <canvas id="leapfrog_f64" width="300" height="300"></canvas>
            <canvas id="stormerVerlet_f64" width="300" height="300"></canvas>
            <canvas id="velocityVerlet_f64" width="300" height="300"></canvas>
        </div>

        <script src="particles.js"></script>
        <script src="integrators/common.js"></script>
        <script src="integrators/explicit-euler.js"></script>
        <script src="integrators/semi-implicit-euler.js"></script>
        <script src="integrators/leapfrog.js"></script>
        <script src="integrators/stormer-verlet.js"></script>
        <script src="integrators/velocity-verlet.js"></script>
        <script>
            const particleSprite = new Image();
            particleSprite.src = "particle.png";

            const SCALE = 100.0;
            let G = 1.0;
            let substeps = 4;
            let particleCount = 60;
            let timestep = 50;

            const INTEGRATORS = {
                explicitEuler:     { fn: explicitEulerStep,     label: "Explicit Euler" },
                semiImplicitEuler: { fn: semiImplicitEulerStep, label: "Semi-implicit Euler" },
                leapfrog:          { fn: leapfrogStep,          label: "Leapfrog (KDK)" },
                stormerVerlet:     { fn: stormerVerletStep,     label: "Störmer-Verlet" },
                velocityVerlet:    { fn: velocityVerletStep,    label: "Velocity Verlet" },
            };

            class Simulation {
                constructor(canvasId, integratorKey, precision) {
                    this.canvas = document.getElementById(canvasId);
                    this.ctx = this.canvas.getContext("2d");
                    this.particles = [];
                    this.expectedEnergy = 0;
                    this.gapDecohesionAt = 0;
                    this.energyCollapseAt = 0;
                    this.startedAt = performance.now();
                    this.integrate = INTEGRATORS[integratorKey].fn;
                    this.precision = precision;
                    this.label = `${INTEGRATORS[integratorKey].label} / ${precision === "f32" ? "32bit" : "64bit"}`;
                }

                resetParticles() {
                    this.particles = createParticles(this.particles, particleCount);
                }

                gravityPull(particle) {
                    let fx = 0, fy = 0;
                    for (const other of this.particles) {
                        if (other === particle) continue;
                        const dx = other.position.x - particle.position.x;
                        const dy = other.position.y - particle.position.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        fx += G * 0.01 * dx / dist;
                        fy += G * 0.01 * dy / dist;
                    }
                    return { x: fx, y: fy, magnitude: Math.sqrt(fx * fx + fy * fy) };
                }

                initOrbitalVelocities() {
                    for (const p of this.particles) {
                        const force = this.gravityPull(p);
                        const speed = Math.sqrt(force.magnitude);
                        const perpDir = Math.atan2(force.y, force.x) + Math.PI / 2;
                        p.velocity.x = speed * Math.cos(perpDir);
                        p.velocity.y = speed * Math.sin(perpDir);
                        p.acceleration.x = force.x;
                        p.acceleration.y = force.y;
                    }
                    this.expectedEnergy = this.totalEnergy();
                }

                totalEnergy() {
                    let e = 0;
                    for (const p of this.particles) {
                        e += 0.5 * (p.velocity.x ** 2 + p.velocity.y ** 2);
                    }
                    return e;
                }

                avgDistance() {
                    let sum = 0;
                    for (const p of this.particles)
                        sum += Math.sqrt(p.position.x ** 2 + p.position.y ** 2);
                    return sum / this.particles.length;
                }

                maxNeighborGap() {
                    let max = 0;
                    for (let i = 0; i < this.particles.length - 1; i++) {
                        const a = this.particles[i], b = this.particles[i + 1];
                        const dx = b.position.x - a.position.x;
                        const dy = b.position.y - a.position.y;
                        max = Math.max(max, Math.sqrt(dx * dx + dy * dy));
                    }
                    return max;
                }

                reset() {
                    this.particles.length = 0;
                    this.resetParticles();
                    this.initOrbitalVelocities();
                    this.startedAt = performance.now();
                    this.gapDecohesionAt = 0;
                    this.energyCollapseAt = 0;
                }

                draw() {
                    const dt = timestep / 1000 / substeps;
                    const { ctx, canvas } = this;
                    const pullFn = (p) => this.gravityPull(p);

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    for (let i = 0; i < substeps; i++)
                        this.integrate(this.particles, dt, pullFn, this.precision);

                    const cx = canvas.width / 2, cy = canvas.height / 2;
                    for (const p of this.particles)
                        ctx.drawImage(particleSprite, p.position.x * SCALE - 32 + cx, p.position.y * SCALE - 32 + cy, 64, 64);

                    // HUD
                    ctx.fillStyle = "black";
                    ctx.font = "12px Arial";

                    const avgDist = this.avgDistance();
                    const distDrift = Math.sqrt(Math.abs(avgDist - 1)) * -Math.sign(avgDist - 1);
                    ctx.fillText(`Dist drift: ${distDrift.toFixed(4)}`, 10, 20);

                    const energy = this.totalEnergy();
                    const eDiff = energy - this.expectedEnergy;
                    const energyDrift = Math.sqrt(Math.abs(eDiff)) * Math.sign(eDiff);
                    ctx.fillText(`Energy drift: ${energyDrift.toFixed(4)}`, 190, 20);

                    const runtime = (performance.now() - this.startedAt) / 1000;

                    if (!this.gapDecohesionAt && this.maxNeighborGap() > (Math.PI / particleCount) * 2.2)
                        this.gapDecohesionAt = runtime;

                    const energyRatio = Math.abs(energy / this.expectedEnergy - 1);
                    if (!this.energyCollapseAt && energyRatio > 0.1)
                        this.energyCollapseAt = runtime;

                    ctx.font = "11px Arial";

                    // Bottom-left: gap decohesion
                    if (this.gapDecohesionAt) {
                        ctx.fillStyle = "red";
                        ctx.fillText(`Gap decoh: ${this.gapDecohesionAt.toFixed(1)}s`, 10, 290);
                    } else {
                        ctx.fillStyle = "black";
                        ctx.fillText(`Runtime: ${runtime.toFixed(1)}s`, 10, 290);
                    }

                    // Bottom-right: energy collapse
                    if (this.energyCollapseAt) {
                        ctx.fillStyle = "red";
                        ctx.fillText(`E collapse: ${this.energyCollapseAt.toFixed(1)}s`, 170, 290);
                    } else {
                        ctx.fillStyle = "green";
                        ctx.fillText(`E stable (${(energyRatio * 100).toFixed(1)}%)`, 170, 290);
                    }

                    ctx.fillStyle = "black";
                    ctx.font = "bold 11px Arial";
                    ctx.fillText(this.label, 10, 275);

                    requestAnimationFrame(() => this.draw());
                }
            }

            const simulations = [];
            for (const key of Object.keys(INTEGRATORS)) {
                for (const prec of ["f32", "f64"]) {
                    simulations.push(new Simulation(`${key}_${prec}`, key, prec));
                }
            }

            // Slider binding helper
            function bindSlider(id, valueId, parse, format, onChange) {
                const slider = document.getElementById(id);
                const display = document.getElementById(valueId);
                const update = () => {
                    const val = parse(slider.value);
                    display.textContent = format(val);
                    onChange(val);
                };
                slider.addEventListener("input", update);
                update(); // sync initial value
            }

            bindSlider("gravitySlider", "gravityValue", parseFloat, v => v.toFixed(2), v => G = v);
            bindSlider("particlesSlider", "particlesValue", parseInt, String, v => {
                particleCount = v;
                for (const sim of simulations) {
                    if (sim.particles.length > particleCount)
                        sim.particles.length = particleCount;
                    sim.resetParticles();
                    sim.initOrbitalVelocities();
                }
            });
            bindSlider("substepsSlider", "substepsValue", parseInt, String, v => substeps = v);
            bindSlider("timestepSlider", "timestepValue", parseFloat, v => v.toFixed(1), v => timestep = v);

            document.getElementById("resetButton").addEventListener("click", () => {
                for (const sim of simulations) sim.reset();
            });

            for (const sim of simulations) {
                sim.resetParticles();
                sim.initOrbitalVelocities();
                sim.draw();
            }
        </script>
    </body>
</html>
